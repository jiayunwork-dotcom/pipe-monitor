version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pipe-monitor-postgres
    environment:
      POSTGRES_DB: pipe_monitor
      POSTGRES_USER: pipe_admin
      POSTGRES_PASSWORD: pipe_monitor_pwd_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pipe_admin -d pipe_monitor"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pipe-monitor-net

  redis:
    image: redis:7-alpine
    container_name: pipe-monitor-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pipe-monitor-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pipe-monitor-backend
    environment:
      - GO_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=pipe_admin
      - DB_PASSWORD=pipe_monitor_pwd_2024
      - DB_NAME=pipe_monitor
      - REDIS_ADDR=redis:6379
      - JWT_SECRET=pipe-monitor-super-secret-key-change-in-production
      - SERVER_PORT=8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pipe-monitor-net

  frontend-build:
    image: node:20-alpine
    container_name: pipe-monitor-frontend-build
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_dist:/app/dist
    command: sh -c "npm install && npm run build"

  nginx:
    image: nginx:alpine
    container_name: pipe-monitor-nginx
    ports:
      - "80:80"
    volumes:
      - frontend_dist:/usr/share/nginx/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      backend:
        condition: service_started
      frontend-build:
        condition: service_completed_successfully
    networks:
      - pipe-monitor-net

volumes:
  postgres_data:
  redis_data:
  frontend_dist:

networks:
  pipe-monitor-net:
    driver: bridge
